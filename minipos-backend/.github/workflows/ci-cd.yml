name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/minipos

jobs:
# ── Build & Test ──────────────────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MiniPOS.sln

      - name: Build
        run: dotnet build MiniPOS.sln --no-restore -c Release

      - name: Test
        run: dotnet test MiniPOS.sln --no-build -c Release --logger trx --results-directory TestResults
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/

# ── Docker Build & Push (main only) ──────────────────────────────────────────
  docker:
    name: Docker — ${{ matrix.service }}
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: pos-webhost
            dockerfile: src/POS.WebHost/Dockerfile
          - service: basket-service
            dockerfile: src/Basket.Service/Dockerfile
          - service: articles-service
            dockerfile: src/Articles.Service/Dockerfile
          - service: payment-service
            dockerfile: src/Payment.Service/Dockerfile
          - service: forecourt-service
            dockerfile: src/Forecourt.Service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context:   .
          file:      ${{ matrix.dockerfile }}
          push:      true
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}

# ── Deploy to Render ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    needs: docker
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger deploy
        run: |
          HOOKS=("${{ secrets.RENDER_DEPLOY_POS_WEBHOST }}" "${{ secrets.RENDER_DEPLOY_BASKET }}" "${{ secrets.RENDER_DEPLOY_ARTICLES }}" "${{ secrets.RENDER_DEPLOY_PAYMENT }}" "${{ secrets.RENDER_DEPLOY_FORECOURT }}")
          for hook in "${HOOKS[@]}"; do
            [ -n "$hook" ] && curl -sf -X POST "$hook" && echo "Triggered" || echo "Skipped (no hook)"
          done

      - name: Deployment summary
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Services**: 5 microservices deployed" >> $GITHUB_STEP_SUMMARY
