version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════════
#  minipos-backend — docker-compose.yml
#
#  Runs all 5 microservices + infrastructure.
#  The frontend is a SEPARATE repo — run it from minipos-frontend.
#
#  Quick start:
#    docker-compose up --build
#
#  Service URLs (all have Swagger UI):
#    POS.WebHost      →  http://localhost:5000/swagger
#    Basket.Service   →  http://localhost:5001/swagger
#    Articles.Service →  http://localhost:5002/swagger
#    Payment.Service  →  http://localhost:5003/swagger
#    Forecourt.Service→  http://localhost:5004/swagger
#    RabbitMQ UI      →  http://localhost:15672  (admin / password)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pos-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks: [minipos]

  redis:
    image: redis:7.2-alpine
    container_name: pos-redis
    hostname: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [minipos]

  # ── Microservices ─────────────────────────────────────────────────────────────

  pos-webhost:
    build:
      context: .
      dockerfile: src/POS.WebHost/Dockerfile
    container_name: pos-webhost
    hostname: pos-webhost
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: admin
      RabbitMQ__Password: password
      Jwt__Key: ${JWT_KEY:-MiniPOS-Super-Secret-Key-2024-VRP-FCx-DoNotCommit!!}
      Cors__AllowedOrigin: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks: [minipos]
    restart: unless-stopped

  basket-service:
    build:
      context: .
      dockerfile: src/Basket.Service/Dockerfile
    container_name: pos-basket
    hostname: basket-service
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: admin
      RabbitMQ__Password: password
      Redis__Connection: redis:6379
      ArticlesService__BaseUrl: http://articles-service:8080
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [minipos]
    restart: unless-stopped

  articles-service:
    build:
      context: .
      dockerfile: src/Articles.Service/Dockerfile
    container_name: pos-articles
    hostname: articles-service
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
    networks: [minipos]
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: src/Payment.Service/Dockerfile
    container_name: pos-payment
    hostname: payment-service
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: admin
      RabbitMQ__Password: password
    depends_on:
      rabbitmq: { condition: service_healthy }
    networks: [minipos]
    restart: unless-stopped

  forecourt-service:
    build:
      context: .
      dockerfile: src/Forecourt.Service/Dockerfile
    container_name: pos-forecourt
    hostname: forecourt-service
    ports:
      - "5004:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: admin
      RabbitMQ__Password: password
    depends_on:
      rabbitmq: { condition: service_healthy }
    networks: [minipos]
    restart: unless-stopped

volumes:
  rabbitmq_data:
  redis_data:

networks:
  minipos:
    driver: bridge
