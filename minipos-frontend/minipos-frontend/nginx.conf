# nginx.conf — Mini POS Frontend
# Routes API paths to the correct backend microservice.
# In local dev, vite.config.js handles the same routing via proxy.

server {
    listen 80;
    server_name _;

    # ── React SPA ───────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── POS.WebHost — SignalR WebSocket ─────────────────────────────────────
    location /hubs/ {
        proxy_pass         http://pos-webhost:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;  # Keep WS alive
    }

    # ── POS.WebHost — Auth API ───────────────────────────────────────────────
    location /api/auth/ {
        proxy_pass       http://pos-webhost:8080;
        proxy_set_header Host $host;
    }

    # ── Articles.Service — Product catalogue ────────────────────────────────
    location /api/v1/articles/ {
        proxy_pass       http://articles-service:8080;
        proxy_set_header Host $host;
    }

    # ── Forecourt.Service — Initial pump state ───────────────────────────────
    location /api/forecourt/ {
        proxy_pass       http://forecourt-service:8080;
        proxy_set_header Host $host;
    }

    # ── Payment.Service — Transaction history ────────────────────────────────
    location /api/payment/ {
        proxy_pass       http://payment-service:8080;
        proxy_set_header Host $host;
    }

    # ── Basket.Service — Debug read ──────────────────────────────────────────
    location /api/basket/ {
        proxy_pass       http://basket-service:8080;
        proxy_set_header Host $host;
    }

    # ── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/html application/javascript application/json text/css;
}
